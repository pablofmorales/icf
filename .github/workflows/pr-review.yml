name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    # Only run on PRs from within the same repo (not forks).
    # Fork PRs do not have access to secrets, but running on them still
    # executes untrusted code on our self-hosted runner with our environment.
    # Prevents GH_PAT exfiltration via malicious PRs from forks.
    # https://securitylab.github.com/research/github-actions-preventing-pwn-requests/
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout pr-review-agents
        uses: actions/checkout@v4
        with:
          repository: blackasteroid/pr-review-agents
          token: ${{ secrets.GH_PAT }}
          path: .pr-review-agents

      - name: Run agent reviews
        env:
          OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          chmod +x .pr-review-agents/scripts/review.sh
          bash .pr-review-agents/scripts/review.sh
